/**:
  controller_manager:
    ros__parameters:
      update_rate: 100 # Joint state pub rate
      diagnostics:
        threshold:
          controller_manager:
            periodicity:
              mean_error:
                warn: 1.0
                error: 10.0
              standard_deviation:
                warn: 1.0
                error: 10.0
          controllers:
            execution_time:
              mean_error:
                warn: 10.0
                error: 2000.0
              standard_deviation:
                warn: 10.0
                error: 200.0
            periodicity:
              mean_error:
                warn: 1.0
                error: 10.0
              standard_deviation:
                warn: 1.0
                error: 10.0
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      dg3f_b_controller:
        type: joint_trajectory_controller/JointTrajectoryController

  dg3f_b_controller:
    ros__parameters:
      state_publish_rate: 500.0
      action_monitor_rate: 500.0
      allow_nonzero_velocity_at_trajectory_end: false
      gains:
        j_dg_1_1:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_1_2:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_1_3:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_1_4:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_2_1:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_2_2:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_2_3:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_2_4:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_3_1:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_3_2:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_3_3:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001
        j_dg_3_4:
          p: 1.5
          i: 0.0
          d: 0.0
          i_clamp_max: 0.0
          i_clamp_min: 0.0
          ff_velocity_scale: 0.0001

      allow_partial_joints_goal: True
      joints:
        - j_dg_1_1
        - j_dg_1_2
        - j_dg_1_3
        - j_dg_1_4
        - j_dg_2_1
        - j_dg_2_2
        - j_dg_2_3
        - j_dg_2_4
        - j_dg_3_1
        - j_dg_3_2
        - j_dg_3_3
        - j_dg_3_4
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity

  joint_state_broadcaster:
    ros__parameters:
      update_rate: 100 # Joint state pub rate (must be <= controller_manager update_rate)
      joints:
        - j_dg_1_1
        - j_dg_1_2
        - j_dg_1_3
        - j_dg_1_4
        - j_dg_2_1
        - j_dg_2_2
        - j_dg_2_3
        - j_dg_2_4
        - j_dg_3_1
        - j_dg_3_2
        - j_dg_3_3
        - j_dg_3_4
